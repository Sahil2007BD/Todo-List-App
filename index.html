<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List App</title>
    <link rel="stylesheet" href="style.css">
  </head>
   
  
    <body>   
      
      

      <section class="todo">
        <h2>My Todo List</h2>
        <div class="input">
          <input 
            type="text" 
            class="input-field" 
            id="todoInput" 
            placeholder="Add new things to do"
          />
        <button class="btn">Add</button>
        </div>


        <ul class="scroll">
          <li id="todoList"></li>
        </ul>

        <div>
          <hr class="counter">
          <div class="counter-container">
            <p><Span>0</Span>Items total</p>
            <button id="deleteButton">Delete All</button>
          </div>
        </div>





      </section>



      <footer>
        <div class="footer">
          <p class="">Made</p>
          <p class="author">Sahildev</p>
        </div>


      
      </footer>






    </body>

</html>
